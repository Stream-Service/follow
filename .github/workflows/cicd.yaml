name: follow-pipeline


 

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout codewsw
        uses: actions/checkout@v3

      # 2. Set up Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      # 3. Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build and push Docker image
       
       
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/follow:latest
            ${{ secrets.DOCKER_USERNAME }}/follow:${{ github.sha }}
       
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG10 }}" | base64 -d > ~/.kube/config


      
      

      
           

       
       

      # 10. Apply Kubernetes manifests
      - name: Apply Kubernetes manifests

        run: |
          kubectl apply -f k8s/neo_service.yaml
          
          kubectl apply -f k8s/services.yaml
          kubectl apply -f k8s/deployment.yaml

 